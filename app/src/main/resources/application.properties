spring.main.banner_mode=off
# server
server.shutdown=graceful
# actuators
management.endpoints.web.exposure.include=prometheus,health
# actuator - health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-components=always
management.endpoint.health.show-details=always
management.endpoint.health.group.liveness.include=camelHealth
# actuator - metrics
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true
management.metrics.enable.http.client.requests=false
# camel
camel.mdc.enabled=true
camel.main.jmx-enabled=false

sftp.port=22
sftp.remoteFilePath=outbound/dokdistsentralprint

# codec max-in-memory-size
spring.http.codecs.max-in-memory-size=1MB

# jackson
spring.jackson.deserialization.fail-on-null-for-primitives=false
